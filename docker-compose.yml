version: "3.9"

services:
  backend:
    build: ./orgi-backend
    ports:
      - "8000:8000"
    volumes:
      - ./orgi-backend:/app
      - ./Database app:/data
    environment:
      - DATABASE_URL=sqlite:///./data/orgi_dev.db
      - SECRET_KEY=dev-secret-key-change-in-production
      - FRONTEND_URL=http://localhost:3000
      - ENVIRONMENT=development

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./orgi-frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
